# STM32F1 OpenOCD Configuration
# For use with ST-Link debugger and STM32F103C/T variants

# Source the interface configuration
source [find interface/stlink.cfg]

# Source the target configuration for STM32F1
source [find target/stm32f1x.cfg]

# Set adapter speed (lower for F1, as it may need more margin)
adapter speed 1000

# Additional F1-specific settings
set WORKAREASIZE 0x5000
