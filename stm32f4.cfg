############################################################################
#
# STM32F407VET6 OpenOCD Configuration
# For STM32F4-Discovery Board with ST-Link v2
#
# Usage:
#   openocd -f stm32f4.cfg
#
############################################################################

# Adapter: ST-Link v2
adapter driver stlink

# Transport: SWD (Serial Wire Debug)
transport select swd

# Target: STM32F407
set CHIPNAME STM32F407
set ENDIAN little

# Reset type: connect under reset
reset_config connect_assert_srst

# Create target
source [find target/stm32f4x.cfg]

# Set default baudrate for serial monitor (if using UART)
set STLINK_FREQ 4000

# Commands to run after connection
$_TARGETNAME configure -event gdb-attach {
    halt
}

########################################################################
# CUSTOM COMMANDS
########################################################################

# Command: Check if board is connected
proc check_connection {} {
    puts "Checking STM32F407 connection..."
    catch {
        halt
        puts "✓ Board connected! IDCode: [format 0x%08x [info]]"
    } err {
        puts "✗ Board NOT connected!"
        puts "Error: $err"
        return -1
    }
    resume
}

# Command: Fast flash (for testing)
proc flash_test {hexfile} {
    puts "Flashing: $hexfile"
    halt
    flash write_image erase $hexfile 0x08000000 ihex
    verify_image $hexfile 0x08000000 ihex
    puts "✓ Flash complete!"
    reset
    resume
}

# Command: Reset board
proc reset_board {} {
    puts "Resetting STM32F407..."
    reset
    resume
}

# Print welcome message
puts ""
puts "===== STM32F407 OpenOCD Config Loaded ====="
puts "Commands available:"
puts "  check_connection   - Test board connection"
puts "  flash_test FILE    - Flash HEX file to board"
puts "  reset_board        - Reset and run"
puts ""
puts "GDB Usage:"
puts "  target remote :3333"
puts "  load"
puts "  run"
puts ""
